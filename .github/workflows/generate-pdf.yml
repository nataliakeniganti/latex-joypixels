name: Fix PDF Creation
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fix-and-convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # We install ghostscript because ImageMagick uses it as the 'delegate' for PDF
          sudo apt-get install -y imagemagick ghostscript

      - name: Force Enable PDF Policy
        run: |
          # This command finds the specific line and changes "none" to "read|write"
          # We use a broad search pattern to ensure it hits the right file
          sudo find /etc/ImageMagick* -name "policy.xml" -exec sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/g' {} +

      - name: Create hwemoji Style PDF
        run: |
          # 1. We switch to 'convert' to avoid the 'montage' grid limits
          # 2. We use -gravity center to keep the emoji centered
          # 3. We use -units and -density to ensure consistent scaling
          
          convert -limit memory 1GiB -limit map 2GiB \
                  "assets/*.png" \
                  -gravity center \
                  -background white \
                  -units PixelsPerInch \
                  -density 300 \
                  emoji-assets.pdf

      - name: Upload or Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add emoji-assets.pdf
          git commit -m "chore: update emoji pdf catalog" || echo "No changes"
          git push origin main