name: Image to PDF Converter
on: [push, workflow_dispatch]

jobs:
  convert-to-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install & Configure ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          
          # FIX 1: Overwrite the security policy that blocks PDF writing
          # This is the most common cause of "Operation not allowed" errors
          sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml

      - name: Execute Conversion
        run: |
          # FIX 2: Use -limit to prevent memory/cache crashes with large emoji sets
          # FIX 3: Use montage for tiled layouts (better for thousands of icons)
          # Replace 'assets/*.png' with your actual path
          montage -limit memory 2GiB -limit map 4GiB \
                  "assets/*.png" \
                  -tile 10x14 \
                  -geometry 128x128+5+5 \
                  -density 300 \
                  -background white \
                  -label "%t" \
                  joypixels-assets.pdf

      - name: Upload Finished PDF
        uses: actions/upload-artifact@v4
        with:
          name: emoji-reference
          path: joypixels-assets.pdf
