name: Sync emoji qualification variants

on:
  workflow_dispatch:
  push:
    paths:
      - 'assets/*.png'

permissions:
  contents: write
  pull-requests: write


# ── Bot identity used for every git commit in this workflow ──────────────────
# The numeric prefix (41898282) is the verified user-id of the
# github-actions[bot] service account; GitHub uses it to link commits to the
# bot's profile page and show the verified-commit badge.
env:
  BOT_NAME:  "github-actions[bot]"
  BOT_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 – copy FQ / MQ / UQ variants (FE0F differences only, no new glyphs)
  # ════════════════════════════════════════════════════════════════════════════
  sync-variants:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download emoji-test.txt
        run: |
          curl -sSL https://unicode.org/Public/emoji/16.0/emoji-test.txt \
            -o emoji-test.txt

      - name: Generate missing qualification variants
        run: |
          python3 - << 'EOF'
          import re
          import shutil
          from pathlib import Path

          ASSETS = Path("assets")
          TEST   = Path("emoji-test.txt")

          STATUSES = {"fully-qualified", "minimally-qualified", "unqualified"}
          entries  = []

          for line in TEST.read_text(encoding="utf-8").splitlines():
              line = line.strip()
              if not line or line.startswith("#"):
                  continue
              m = re.match(r"^([0-9A-Fa-f ]+?)\s*;\s*(\S+(?:-\S+)?)", line)
              if not m:
                  continue
              cps_raw, status = m.group(1).strip(), m.group(2)
              if status not in STATUSES:
                  continue
              stem = "-".join(cp.lower() for cp in cps_raw.split())
              entries.append((stem, status, cps_raw))

          existing = {p.stem for p in ASSETS.glob("*.png")}

          def skeleton(stem: str) -> str:
              """Strip fe0f — bare codepoints, keeping 200d structure."""
              return "-".join(p for p in stem.split("-") if p != "fe0f")

          skel_to_source: dict[str, str] = {}
          for stem, _, _ in entries:
              sk = skeleton(stem)
              if stem in existing and sk not in skel_to_source:
                  skel_to_source[sk] = stem

          copied  = []
          missing = []

          for stem, status, cps_raw in entries:
              if stem in existing:
                  continue
              # Job 1 only handles non-ZWJ variants
              if "200D" in cps_raw.upper().split():
                  continue
              sk  = skeleton(stem)
              src = skel_to_source.get(sk)
              if src:
                  shutil.copy2(ASSETS / f"{src}.png", ASSETS / f"{stem}.png")
                  copied.append((stem, status, src))
                  print(f"  copied  {src}.png  →  {stem}.png  [{status}]")
              else:
                  missing.append((stem, status, cps_raw))

          print(f"\n=== FE0F variant summary ===")
          print(f"  Entries parsed  : {len(entries)}")
          print(f"  Already present : {len(existing)}")
          print(f"  Copied          : {len(copied)}")
          print(f"  No source found : {len(missing)}")

          if missing:
              print("\n--- No source PNG (non-ZWJ) ---")
              for stem, status, cps in missing:
                  print(f"  {stem}  [{status}]  ({cps})")

          Path("copied_variants.txt").write_text(
              "\n".join(f"{s}\t{st}" for s, st, _ in copied))
          Path("missing_sources.txt").write_text(
              "\n".join(f"{s}\t{st}\t{c}" for s, st, c in missing))
          EOF

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet HEAD -- assets/ \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Write step summary
        if: steps.changes.outputs.changed == 'true'
        run: |
          COUNT=$(wc -l < copied_variants.txt | tr -d ' ')
          echo "### FE0F variant sync" >> "$GITHUB_STEP_SUMMARY"
          echo "Added **${COUNT}** qualification-variant PNGs." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| filename | status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          head -100 copied_variants.txt \
            | awk -F'\t' '{print "| `" $1 ".png` | " $2 " |"}' \
            >> "$GITHUB_STEP_SUMMARY"
          [ $(wc -l < copied_variants.txt) -gt 100 ] \
            && echo "| … see artifact | |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifacts
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: emoji-sync-fq-mq-uq
          path: |
            copied_variants.txt
            missing_sources.txt

      - name: Commit and push new assets
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="emoji-sync/qualification-variants"
          COUNT=$(wc -l < copied_variants.txt | tr -d ' ')

          git config user.name  "$BOT_NAME"
          git config user.email "$BOT_EMAIL"

          # Create or reset the target branch from the current HEAD
          git checkout -B "$BRANCH" "${{ github.sha }}"

          # Stage every new PNG (untracked files only — no deletions)
          git add assets/*.png

          git commit -m "assets: add emoji qualification variants (FQ / MQ / UQ)

          Added ${COUNT} missing PNG files for fully-qualified,
          minimally-qualified, and unqualified forms listed in
          unicode.org/Public/emoji/16.0/emoji-test.txt.

          Variant files are copies of the nearest existing sibling asset;
          filename derived from the exact codepoint sequence
          (lowercase hex joined by '-', e.g. 0023-fe0f-20e3.png).

          [skip ci]"

          git push --force-with-lease origin "$BRANCH"

      - name: Open pull request via GitHub CLI
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="emoji-sync/qualification-variants"
          COUNT=$(wc -l < copied_variants.txt | tr -d ' ')

          # gh pr create is idempotent — fails silently if PR already open
          gh pr create \
            --head  "$BRANCH" \
            --base  "${{ github.event.repository.default_branch }}" \
            --title "assets: add emoji qualification variants (FQ / MQ / UQ)" \
            --body  "Adds **${COUNT}** missing PNGs for fully-qualified, minimally-qualified, and unqualified emoji forms from emoji-test.txt 16.0.

          Variant files are copies of the nearest existing sibling asset. See the **emoji-sync-fq-mq-uq** run artifact for the full file list.

          _Generated automatically by the sync-emoji-assets workflow._" \
            --label "assets,automated" \
          || echo "PR already exists — skipping creation."

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 – synthesise missing ZWJ (U+200D) sequence assets
  #
  # For every ZWJ sequence with no PNG:
  #   • Split on 200D → collect component codepoint segments
  #   • Drop FE0F from each segment; look up component PNG in assets/
  #   • If all components found → composite left-to-right with ImageMagick
  #   • Otherwise → log to zwj_missing_components.txt for manual artwork
  # ════════════════════════════════════════════════════════════════════════════
  sync-zwj:
    runs-on: ubuntu-latest
    needs: sync-variants

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Download emoji-test.txt
        run: |
          curl -sSL https://unicode.org/Public/emoji/16.0/emoji-test.txt \
            -o emoji-test.txt

      - name: Synthesise missing ZWJ assets
        run: |
          python3 - << 'EOF'
          import re
          import subprocess
          import shutil
          from pathlib import Path

          ASSETS = Path("assets")
          TEST   = Path("emoji-test.txt")

          STATUSES = {"fully-qualified", "minimally-qualified", "unqualified"}
          zwj_entries = []   # (stem, status, [codepoint, ...])

          for line in TEST.read_text(encoding="utf-8").splitlines():
              line = line.strip()
              if not line or line.startswith("#"):
                  continue
              m = re.match(r"^([0-9A-Fa-f ]+?)\s*;\s*(\S+(?:-\S+)?)", line)
              if not m:
                  continue
              cps_raw, status = m.group(1).strip(), m.group(2)
              if status not in STATUSES:
                  continue
              cps = cps_raw.upper().split()
              if "200D" not in cps:
                  continue
              stem = "-".join(cp.lower() for cp in cps)
              zwj_entries.append((stem, status, cps))

          existing = {p.stem for p in ASSETS.glob("*.png")}

          already = sum(1 for s, _, _ in zwj_entries if s in existing)
          print(f"ZWJ entries in emoji-test.txt : {len(zwj_entries)}")
          print(f"Already present               : {already}")
          print(f"Need synthesis                : {len(zwj_entries) - already}")

          synthesised       = []
          missing_component = []

          for stem, status, cps in zwj_entries:
              if stem in existing:
                  continue

              # ── Split on 200D into per-component segment lists ──────────────
              segments: list[list[str]] = []
              current: list[str] = []
              for cp in cps:
                  if cp == "200D":
                      if current:
                          segments.append(current)
                      current = []
                  elif cp != "FE0F":
                      current.append(cp)
              if current:
                  segments.append(current)

              # ── Locate best PNG for each segment ────────────────────────────
              def find_png(seg: list[str]) -> Path | None:
                  bare = "-".join(cp.lower() for cp in seg)
                  p = ASSETS / f"{bare}.png"
                  if p.exists():
                      return p
                  # Also try with fe0f appended (some assets include it)
                  with_fe0f = bare.replace("-", "-fe0f-", 1) if len(seg) == 1 else None
                  if with_fe0f:
                      p2 = ASSETS / f"{with_fe0f}.png"
                      if p2.exists():
                          return p2
                  return None

              component_paths: list[Path] = []
              all_found = True
              for seg in segments:
                  p = find_png(seg)
                  if p is None:
                      all_found = False
                      break
                  component_paths.append(p)

              if not all_found:
                  missing_component.append((stem, status, " ".join(cps)))
                  continue

              dst = ASSETS / f"{stem}.png"

              # Single-component edge-case (shouldn't appear but be safe)
              if len(component_paths) == 1:
                  shutil.copy2(component_paths[0], dst)
                  synthesised.append((stem, status, component_paths))
                  continue

              # ── Composite with ImageMagick ───────────────────────────────────
              # Resize each component to 64×64, append side-by-side, then
              # normalise the result height to 64 px.
              cmd = ["convert"]
              for p in component_paths:
                  cmd += ["(", "-resize", "64x64", str(p), ")"]
              cmd += ["+append", "-resize", "x64", str(dst)]

              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode != 0:
                  print(f"  ERROR  {stem}: {result.stderr.strip()}")
                  missing_component.append((stem, status, " ".join(cps)))
              else:
                  srcs = " + ".join(p.name for p in component_paths)
                  print(f"  synth  {srcs}  →  {stem}.png  [{status}]")
                  synthesised.append((stem, status, component_paths))

          # ── Report ───────────────────────────────────────────────────────────
          print(f"\n=== ZWJ synthesis summary ===")
          print(f"  Synthesised           : {len(synthesised)}")
          print(f"  Missing component PNG : {len(missing_component)}")

          if missing_component:
              print("\n--- ZWJ sequences with missing component PNGs ---")
              for stem, status, cps in missing_component:
                  print(f"  {stem}  [{status}]  ({cps})")

          Path("zwj_synthesised.txt").write_text(
              "\n".join(f"{s}\t{st}" for s, st, _ in synthesised))
          Path("zwj_missing_components.txt").write_text(
              "\n".join(f"{s}\t{st}\t{c}" for s, st, c in missing_component))
          EOF

      - name: Check for changes
        id: zwj_changes
        run: |
          git diff --quiet HEAD -- assets/ \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Write step summary
        if: steps.zwj_changes.outputs.changed == 'true'
        run: |
          SYNTH=$(wc -l < zwj_synthesised.txt | tr -d ' ')
          MISS=$(wc -l < zwj_missing_components.txt | tr -d ' ')
          echo "### ZWJ sequence synthesis" >> "$GITHUB_STEP_SUMMARY"
          echo "Synthesised **${SYNTH}** ZWJ assets." \
            >> "$GITHUB_STEP_SUMMARY"
          echo "${MISS} sequences still need hand-drawn artwork." \
            >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| filename | status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          head -100 zwj_synthesised.txt \
            | awk -F'\t' '{print "| `" $1 ".png` | " $2 " |"}' \
            >> "$GITHUB_STEP_SUMMARY"
          [ $(wc -l < zwj_synthesised.txt) -gt 100 ] \
            && echo "| … see artifact | |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload ZWJ report artifacts
        if: steps.zwj_changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: emoji-sync-zwj
          path: |
            zwj_synthesised.txt
            zwj_missing_components.txt

      - name: Commit and push synthesised ZWJ assets
        if: steps.zwj_changes.outputs.changed == 'true'
        run: |
          BRANCH="emoji-sync/zwj-sequences"
          SYNTH=$(wc -l < zwj_synthesised.txt | tr -d ' ')
          MISS=$(wc -l < zwj_missing_components.txt | tr -d ' ')

          git config user.name  "$BOT_NAME"
          git config user.email "$BOT_EMAIL"

          # Branch from the triggering commit so your push is included
          git checkout -B "$BRANCH" "${{ github.sha }}"

          git add assets/*.png

          git commit -m "assets: synthesise missing ZWJ (U+200D) sequence PNGs

          Synthesised ${SYNTH} ZWJ sequence PNGs by compositing component
          assets left-to-right at 64 px height via ImageMagick.
          ${MISS} sequences still need hand-drawn artwork (see artifact).

          Generated against unicode.org/Public/emoji/16.0/emoji-test.txt.

          [skip ci]"

          git push --force-with-lease origin "$BRANCH"

      - name: Open pull request via GitHub CLI
        if: steps.zwj_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="emoji-sync/zwj-sequences"
          SYNTH=$(wc -l < zwj_synthesised.txt | tr -d ' ')
          MISS=$(wc -l < zwj_missing_components.txt | tr -d ' ')

          gh pr create \
            --head  "$BRANCH" \
            --base  "${{ github.event.repository.default_branch }}" \
            --title "assets: synthesise missing ZWJ sequence PNGs (U+200D)" \
            --body  "Adds **${SYNTH}** PNG files for ZWJ emoji sequences that were missing after the FQ/MQ/UQ sync.

          Each file is produced by compositing component PNGs left-to-right at 64 px height via ImageMagick.

          **${MISS}** sequences could not be synthesised (missing component PNGs) — listed in the \`zwj_missing_components.txt\` run artifact; those need hand-drawn artwork.

          See the **emoji-sync-zwj** run artifact for the full file list.

          _Generated automatically by the sync-emoji-assets workflow._" \
            --label "assets,automated,zwj" \
          || echo "PR already exists — skipping creation."
